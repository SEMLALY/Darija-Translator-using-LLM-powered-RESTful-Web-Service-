<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darija Translator</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="container">
      <h1>Darija Translator</h1>

      <label for="sourceText">English text</label>
      <textarea id="sourceText" placeholder="Selected text will appear here..."></textarea>

      <button id="translateBtn" type="button">Translate</button>

      <label for="result">Darija translation</label>
      <div id="result" class="result">Translation will appear here.</div>

      <p id="status" class="status"></p>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
